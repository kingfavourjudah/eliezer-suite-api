name: CI / Deploy to Northflank

on:
  push:
    branches: [main]

jobs:
  ci:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: production
      url: https://p01--eliezer-suite-api--5zqfpszw9hwk.code.run

    steps:
      - name: Trigger Northflank build
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.NORTHFLANK_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.northflank.com/v1/projects/${{ secrets.NORTHFLANK_PROJECT_ID }}/services/${{ secrets.NORTHFLANK_SERVICE_ID }}/build" \
            -d '{"branch":"main"}'

      - name: Deployed
        run: echo "Deployed to https://p01--eliezer-suite-api--5zqfpszw9hwk.code.run"
